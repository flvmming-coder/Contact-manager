name: Publish v1.01.1 Pre-release

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/publish-v1.01.1.yml"
      - ".github/workflows/publish-v1.0.0.yml"
      - "versions/Contact Manager v1.01.1/**"
      - "versions/Contact Manager v1.0.0/README.md"

jobs:
  ensure-v1-0-0-latest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Force v1.0.0 as latest release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FLVMMING_CODER_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "v1.0.0";

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              core.warning(`Release ${tag} not found, skip.`);
              return;
            }

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.data.id,
              tag_name: tag,
              name: release.data.name || "Contact Manager v1.0.0 (35)",
              draft: false,
              prerelease: false,
              make_latest: "true"
            });
            core.info("v1.0.0 set as latest release.");

  publish-v1-01-1-prerelease:
    needs: ensure-v1-0-0-latest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish or update v1.01.1 pre-release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.FLVMMING_CODER_TOKEN || github.token }}
          tag_name: v1.01.1
          name: Contact Manager v1.01.1 (36)
          prerelease: true
          draft: false
          make_latest: false
          body_path: versions/Contact Manager v1.01.1/README.md
          files: versions/Contact Manager v1.01.1/ContactManager-v1.01.1-debug.apk
          fail_on_unmatched_files: true