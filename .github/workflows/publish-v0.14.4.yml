name: Publish v0.14.4 Pre-release

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/publish-v0.14.4.yml"
      - "versions/Contact Manager v0.14.4/**"
      - "versions/Contact Manager v0.14.3/README.md"

jobs:
  ensure-v0-14-3-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Force v0.14.3 to release
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "v0.14.3";

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              core.warning(`Release ${tag} not found, skip.`);
              return;
            }

            const data = release.data;
            if (data.prerelease === false && data.draft === false) {
              core.info("v0.14.3 already set as release.");
              return;
            }

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: data.id,
              tag_name: tag,
              name: data.name || "Contact Manager v0.14.3",
              draft: false,
              prerelease: false
            });
            core.info("v0.14.3 updated to release.");

  publish-v0-14-4-prerelease:
    needs: ensure-v0-14-3-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish or update v0.14.4 pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.14.4
          name: Contact Manager v0.14.4 (16)
          prerelease: true
          draft: false
          body_path: versions/Contact Manager v0.14.4/README.md
          files: versions/Contact Manager v0.14.4/ContactManager-v0.14.4-debug.apk
          fail_on_unmatched_files: true
