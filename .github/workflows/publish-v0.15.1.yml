name: Publish v0.15.1 Release

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/publish-v0.15.1.yml"
      - "versions/Contact Manager v0.15.1/**"
      - "versions/Contact Manager v0.14.4/README.md"

jobs:
  ensure-v0-14-4-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Force v0.14.4 to release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FLVMMING_CODER_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "v0.14.4";

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              core.warning(`Release ${tag} not found, skip.`);
              return;
            }

            const data = release.data;
            if (data.prerelease === false && data.draft === false) {
              core.info("v0.14.4 already set as release.");
              return;
            }

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: data.id,
              tag_name: tag,
              name: data.name || "Contact Manager v0.14.4 (16)",
              draft: false,
              prerelease: false
            });
            core.info("v0.14.4 updated to release.");

  publish-v0-15-1-release:
    needs: ensure-v0-14-4-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish or update v0.15.1 release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.FLVMMING_CODER_TOKEN || github.token }}
          tag_name: v0.15.1
          name: Contact Manager v0.15.1 (17)
          prerelease: false
          draft: false
          body_path: versions/Contact Manager v0.15.1/README.md
          files: versions/Contact Manager v0.15.1/ContactManager-v0.15.1-debug.apk
          fail_on_unmatched_files: true
