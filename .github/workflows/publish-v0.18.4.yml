name: Publish v0.18.4 Release

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/publish-v0.18.4.yml"
      - "versions/Contact Manager v0.18.4/**"

jobs:
  publish-v0-18-4-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish or update v0.18.4 release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.FLVMMING_CODER_TOKEN || github.token }}
          tag_name: v0.18.4
          name: Contact Manager v0.18.4 (27)
          prerelease: false
          draft: false
          make_latest: true
          body_path: versions/Contact Manager v0.18.4/README.md
          files: versions/Contact Manager v0.18.4/ContactManager-v0.18.4-debug.apk
          fail_on_unmatched_files: true
