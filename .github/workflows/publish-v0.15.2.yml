name: Publish v0.15.2 Release
# This workflow also enforces v0.15.2 as latest release.

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/publish-v0.15.2.yml"
      - "versions/Contact Manager v0.15.2/**"
      - "versions/Contact Manager v0.15.1/README.md"

jobs:
  ensure-v0-15-1-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify release token
        run: |
          if [ -z "${{ secrets.FLVMMING_CODER_TOKEN }}" ]; then
            echo "Missing repository secret FLVMMING_CODER_TOKEN."
            echo "Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Force v0.15.1 to release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FLVMMING_CODER_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "v0.15.1";

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              core.warning(`Release ${tag} not found, skip.`);
              return;
            }

            const data = release.data;
            if (data.prerelease === false && data.draft === false) {
              core.info("v0.15.1 already set as release.");
              return;
            }

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: data.id,
              tag_name: tag,
              name: data.name || "Contact Manager v0.15.1 (17)",
              draft: false,
              prerelease: false
            });
            core.info("v0.15.1 updated to release.");

  publish-v0-15-2-release:
    needs: ensure-v0-15-1-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify release token
        run: |
          if [ -z "${{ secrets.FLVMMING_CODER_TOKEN }}" ]; then
            echo "Missing repository secret FLVMMING_CODER_TOKEN."
            echo "Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish or update v0.15.2 release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.FLVMMING_CODER_TOKEN }}
          tag_name: v0.15.2
          name: Contact Manager v0.15.2 (18)
          prerelease: false
          draft: false
          make_latest: true
          body_path: versions/Contact Manager v0.15.2/README.md
          files: versions/Contact Manager v0.15.2/ContactManager-v0.15.2-debug.apk
          fail_on_unmatched_files: true

      - name: Force v0.15.2 as latest
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FLVMMING_CODER_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag: "v0.15.2" });
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: rel.data.id,
              tag_name: "v0.15.2",
              name: rel.data.name || "Contact Manager v0.15.2 (18)",
              draft: false,
              prerelease: false,
              make_latest: "true"
            });
            core.info("v0.15.2 set as latest release.");
