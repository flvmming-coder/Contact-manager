name: Publish v0.16.1 Release

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/publish-v0.16.1.yml"
      - "versions/Contact Manager v0.16.1/**"
      - "versions/Contact Manager v0.15.4/README.md"

jobs:
  ensure-v0-15-4-latest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Force v0.15.4 as latest release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FLVMMING_CODER_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "v0.15.4";

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              core.warning(`Release ${tag} not found, skip.`);
              return;
            }

            const data = release.data;
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: data.id,
              tag_name: tag,
              name: data.name || "Contact Manager v0.15.4 (20)",
              draft: false,
              prerelease: false,
              make_latest: "true"
            });
            core.info("v0.15.4 set as latest release.");

  publish-v0-16-1-release:
    needs: ensure-v0-15-4-latest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish or update v0.16.1 release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.FLVMMING_CODER_TOKEN || github.token }}
          tag_name: v0.16.1
          name: Contact Manager v0.16.1 (21)
          prerelease: false
          draft: false
          make_latest: true
          body_path: versions/Contact Manager v0.16.1/README.md
          files: versions/Contact Manager v0.16.1/ContactManager-v0.16.1-debug.apk
          fail_on_unmatched_files: true
